<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Sentiment Analysis</h1>

        <div class="examples">

            <div class="positive-box">
                😊 Positive Examples
            </div>

            <div class="negative-box">
                😡 Negative Examples
            </div>

        </div>

        <div class="samples">

            <div class="sample positive">
                I love this product!
            </div>

            <div class="sample positive">
                This is amazing!
            </div>

            <div class="sample positive">
                Very good experience
            </div>

        </div>

        <form method="POST" action="/predict">

            <textarea name="text" placeholder="Enter your text for sentiment analysis..." required></textarea>

            <button type="submit">
                Analyze Sentiment
            </button>

        </form>

        {% if prediction %}

        <div class="
        result
        {% if prediction == 'Positive' %}
            positive-result
        {% else %}
            negative-result
        {% endif %}
    ">

            Predicted Sentiment: {{ prediction }}

        </div>

        {% endif %}

        <footer>
            Project based on original work by Ayoub Machkour
        </footer>

    </div>

</body>

</html>
